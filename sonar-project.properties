# SonarCloud configuration for 3D Orofacial Harmonization Simulation

# Project identification
sonar.projectKey=alvarobcmed_simulation-3d-hof
sonar.organization=alvarobcmed
sonar.projectName=3D Orofacial Harmonization Simulation
sonar.projectVersion=1.0.0

# Source code settings
sonar.sources=services,packages,apps/ios
sonar.tests=services/api/tests,packages/*/tests,apps/ios/SimulationAppTests

# Language-specific settings
sonar.python.coverage.reportPaths=services/api/coverage.xml
sonar.javascript.lcov.reportPaths=packages/*/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.pyc,**/venv/**,**/build/**,**/dist/**,**/.pytest_cache/**,**/DerivedData/**

# Python specific
sonar.python.xunit.reportPath=services/api/test-results.xml

# Security and quality settings
sonar.qualitygate.wait=true

# Coverage settings
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/*Tests.swift,**/mock/**,**/fixtures/**

# Duplications
sonar.cpd.exclusions=**/migrations/**,**/alembic/**

# Issues exclusions for generated code
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/alembic/**
sonar.issue.ignore.multicriteria.e2.ruleKey=swift:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/Generated/**
sonar.issue.ignore.multicriteria.e3.ruleKey=*
sonar.issue.ignore.multicriteria.e3.resourceKey=**/node_modules/**