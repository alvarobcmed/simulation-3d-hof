name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  IOS_VERSION: '16.0'

jobs:
  # Backend API Testing
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: simulation_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('services/api/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install API dependencies
      run: |
        cd services/api
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run API unit tests
      run: |
        cd services/api
        python -m pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80
      env:
        DATABASE_URL: postgresql://postgres:testpass@localhost:5432/simulation_test

    - name: Upload API coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: services/api/coverage.xml
        flags: api
        name: api-coverage

  # iOS Application Testing
  ios-tests:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer

    - name: Cache iOS dependencies
      uses: actions/cache@v3
      with:
        path: |
          apps/ios/DerivedData
          ~/Library/Caches/org.swift.swiftpm
        key: ${{ runner.os }}-ios-${{ hashFiles('apps/ios/**/*.swift', 'apps/ios/**/Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-ios-

    - name: Build iOS app
      run: |
        cd apps/ios
        xcodebuild -scheme SimulationApp \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
          clean build

    - name: Run iOS unit tests
      run: |
        cd apps/ios
        xcodebuild test \
          -scheme SimulationApp \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
          -enableCodeCoverage YES

    - name: Upload iOS test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: ios-test-results
        path: apps/ios/build/reports/

  # Shared Packages Testing
  packages-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Cache Node.js dependencies
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('packages/**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install and test shared packages
      run: |
        npm ci
        npm run test:packages --if-present
        npm run build:packages --if-present

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Run Bandit Security Scan (Python)
      run: |
        pip install bandit[toml]
        bandit -r services/ -f json -o bandit-report.json || true

    - name: Run Safety Check (Python Dependencies)
      run: |
        pip install safety
        safety check --json --output safety-report.json || true

    - name: Run Semgrep SAST
      uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/secrets
          p/owasp-top-ten
      env:
        SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  # Dependency Vulnerability Scanning
  dependency-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/setup@master

    - name: Snyk Python scan
      run: |
        cd services/api
        snyk test --severity-threshold=high --json --file=requirements.txt > ../../snyk-python-report.json || true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    - name: Snyk Node.js scan
      run: |
        snyk test --severity-threshold=high --json --file=package.json > snyk-node-report.json || true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    - name: Upload dependency scan results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: dependency-reports
        path: |
          snyk-python-report.json
          snyk-node-report.json

  # Code Quality Analysis
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: [api-tests, packages-tests]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: simulation_integration_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        cd services/api
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run integration tests
      run: |
        cd services/api
        python -m pytest tests/integration/ -v
      env:
        DATABASE_URL: postgresql://postgres:testpass@localhost:5432/simulation_integration_test
        REDIS_URL: redis://localhost:6379

  # Quality Gate Check
  quality-gate:
    runs-on: ubuntu-latest
    needs: [api-tests, ios-tests, packages-tests, security-scan, dependency-scan, code-quality, integration-tests]
    if: always()
    
    steps:
    - name: Check Quality Gate Status
      run: |
        echo "Checking quality gate status..."
        
        # Check if any critical jobs failed
        if [[ "${{ needs.api-tests.result }}" == "failure" ]]; then
          echo "❌ API tests failed"
          exit 1
        fi
        
        if [[ "${{ needs.ios-tests.result }}" == "failure" ]]; then
          echo "❌ iOS tests failed"  
          exit 1
        fi
        
        if [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
          echo "❌ Security scan failed"
          exit 1
        fi
        
        if [[ "${{ needs.dependency-scan.result }}" == "failure" ]]; then
          echo "❌ Dependency scan failed"
          exit 1
        fi
        
        if [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
          echo "❌ Integration tests failed"
          exit 1
        fi
        
        echo "✅ All quality gates passed!"

  # Build and Package (only on main branch)
  build-and-package:
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && success()
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: services/api
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/api:latest
          ghcr.io/${{ github.repository }}/api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build iOS app for distribution
      run: |
        cd apps/ios
        xcodebuild -scheme SimulationApp \
          -configuration Release \
          -archivePath build/SimulationApp.xcarchive \
          archive

    - name: Upload iOS build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ios-build
        path: apps/ios/build/SimulationApp.xcarchive